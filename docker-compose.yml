services:
  swarm-provenance-mcp:
    build:
      context: .
      args:
        VERSION: "0.1.0"
    image: swarm-provenance-mcp:local
    stdin_open: true
    environment:
      - SWARM_GATEWAY_URL=${SWARM_GATEWAY_URL:-https://provenance-gateway.datafund.io}
      - DEFAULT_STAMP_DURATION_HOURS=${DEFAULT_STAMP_DURATION_HOURS:-25}
      - DEFAULT_STAMP_SIZE=${DEFAULT_STAMP_SIZE:-small}
      - PAYMENT_MODE=${PAYMENT_MODE:-free}
    env_file:
      - path: .env
        required: false
