title: Swarm Provenance MCP
description: >
  MCP server for managing Swarm postage stamps and provenance data storage.
  Enables AI agents to purchase stamps, upload/download data to the
  decentralized Swarm network, and manage immutable provenance records.
category: storage
tags:
  - swarm
  - decentralized
  - provenance
  - storage
  - web3

image: ghcr.io/datafund/swarm-provenance-mcp:latest
transport: stdio

env:
  SWARM_GATEWAY_URL:
    description: URL of the swarm_connect FastAPI gateway
    default: "https://provenance-gateway.datafund.io"
    required: false
  DEFAULT_STAMP_DURATION_HOURS:
    description: Default stamp duration in hours (minimum 24)
    default: "25"
    required: false
  DEFAULT_STAMP_SIZE:
    description: "Default stamp size preset: small (~35KB), medium (~500MB), large (~6GB)"
    default: "small"
    required: false
  PAYMENT_MODE:
    description: "Gateway payment tier (free = rate-limited free tier, 3 write req/min)"
    default: "free"
    required: false
